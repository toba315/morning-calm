<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morning Calm Admin</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Morning Calm</p>
          <h1>ニュース管理</h1>
          <p class="summary">ニュース候補を取得し、フロントに反映する5件を手動で選びます。</p>
        </div>
        <div class="actions">
          <button id="fetchNews" type="button">ニュースを取得</button>
          <button id="publishNews" class="primary" type="button" disabled>選択した5件を反映</button>
        </div>
      </header>

      <section class="status-panel" aria-live="polite">
        <div>
          <span class="label">取得日時</span>
          <strong id="generatedAt">-</strong>
        </div>
        <div>
          <span class="label">候補</span>
          <strong id="candidateCount">0件</strong>
        </div>
        <div>
          <span class="label">選択</span>
          <strong id="selectedCount">0 / 5</strong>
        </div>
        <div>
          <span class="label">状態</span>
          <strong id="statusText">読み込み中</strong>
        </div>
      </section>

      <section class="workspace">
        <section>
          <div class="section-head">
            <h2>候補ニュース</h2>
            <button id="clearSelection" type="button">選択解除</button>
          </div>
          <div id="candidateList" class="candidate-list"></div>
        </section>

        <aside class="publish-panel">
          <h2>反映予定</h2>
          <ol id="selectedList" class="selected-list"></ol>
          <p class="note">
            反映すると <code>news-data.js</code> が更新され、アプリのフロントは次回読み込み時に選択した件数を表示します。
          </p>
          <a class="front-link" href="http://localhost:4173/index.html">フロントを確認</a>
        </aside>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
